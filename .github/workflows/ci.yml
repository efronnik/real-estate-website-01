name: CI

on:
  push:
    branches: [main, master]
  pull_request:

jobs:
  quality:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: npm

      - run: npm ci

      - run: npm run lint

      - run: npm run test

      - run: npx playwright install chromium --with-deps

      - run: npm run test:e2e
        env:
          CI: true

      - run: npm run test:e2e:failover
        env:
          CI: true
